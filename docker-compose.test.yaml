# Integration test compose — backend only, no TLS, no frontend.
#
# Usage:
#   docker compose -f docker-compose.test.yaml up --build -d
#   docker compose -f docker-compose.test.yaml down
#
# Set HF_TOKEN in .env or environment for initial model download.
# Models are cached at HF_CACHE on the host (default: ~/.cache/huggingface).

services:
  arbi-tr:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arbi-tr-test
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN:-}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-large-v3}
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/app/models
    runtime: nvidia
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s   # model loading takes time on first run

networks:
  default:
    driver: bridge
