services:
  arbi-tr-api-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arbi-tr-api-container
    image: arbidev/arbi-tr:latest
    command: []
    ports:
      - "8001:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/models
    volumes:
      - /mnt/k8scache/:/app/models
    runtime: nvidia
    networks:
      - backend

  arbi-tr-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arbi-tr-frontend-container
    image: arbidev/arbi-tr-frontend:latest
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=1000
      - API_ENDPOINT=http://arbi-tr-api-container:8000
    restart: always
    networks:
      - backend

networks:
  backend:
    driver: bridge
